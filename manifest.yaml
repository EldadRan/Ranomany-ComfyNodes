# Index of nodes shipped by this repo. Informational — installation still
# selects subdirs by name in the consuming Dockerfile.

save_image_no_meta:
  description: |
    Save images as PNG without ComfyUI's default workflow-JSON metadata.
    Embeds only the keys explicitly provided via `extra_metadata` (JSON dict).
  deps:    []
  version: "0.1.0"

api_key:
  description: |
    Generic API key resolver node. Set key_name to any environment variable
    (e.g. GEMINI_API_KEY, OPENAI_API_KEY) and wire the STRING output to any
    node that needs it. Shows a status badge indicating where the key was found:
    node input, environment variable, or .env file. Works for any provider.
    Resolution order: node input → env var → .env file (node dir / custom_nodes / ComfyUI root).
  deps:    []
  version: "0.1.0"

gemini_image:
  description: |
    Generate or edit images via the Gemini API (gemini-3.1-flash-image-preview or
    gemini-3-pro-image-preview). Accepts an optional input IMAGE for img2img editing.
    Outputs a standard ComfyUI IMAGE batch tensor.
    Requires GEMINI_API_KEY env var (or pass it via the api_key input).
  deps:    [google-genai>=1.0.0]
  version: "0.1.0"

openai_image:
  description: |
    Generate or edit images via the OpenAI Images API (gpt-image-2 / ChatGPT Images 2.0).
    Accepts an optional input IMAGE for editing and an optional MASK for inpainting.
    Outputs a standard ComfyUI IMAGE batch tensor.
    Requires OPENAI_API_KEY env var (or pass it via the api_key input).
  deps:    [openai>=1.0.0]
  version: "0.1.0"

gemini_veo:
  description: |
    Generate videos via the Veo API (veo-3.1-generate-preview and variants).
    Accepts optional first-frame and last-frame IMAGE anchors.
    Outputs a VIDEO value — wire to the bundled Save Video node to write the MP4 to disk.
    Also ships the Save Video node (Category: Ranomany) in the same file.
    Requires GEMINI_API_KEY env var (or pass it via the api_key input).
    Generation takes 1–3 minutes; the node blocks until complete.
  deps:    [google-genai>=1.0.0]
  version: "0.2.0"

wan_image:
  description: |
    Generate or edit images via Alibaba Cloud Wan 2.7 (wan2.7-image-pro, wan2.7-image).
    Supports text-to-image, image editing (prompt + input IMAGE), and image set generation.
    Outputs a standard ComfyUI IMAGE batch tensor.
    No extra dependencies — uses Python stdlib HTTP only.
    Requires DASHSCOPE_API_KEY env var (or pass it via the api_key input).
    Supports both Beijing and Singapore (workspace_id) regional endpoints.
  deps:    []
  version: "0.1.0"

wan_video:
  description: |
    Ships two nodes using Alibaba Cloud Wan 2.7 video models (raw HTTP, no extra deps):

    WanVideo — four modes from a single node:
      • Text-to-video (no image connected)       → model: wan2.7-t2v
      • Image-to-video (first_frame connected)   → model: wan2.7-i2v-2026-04-25
      • First+last frame / r2v                   → model: wan2.7-i2v-2026-04-25
      • Video continuation (first_clip connected) → model: wan2.7-i2v-2026-04-25

    WanVideoEdit — instruction-based video editing:
      • Prompt + source VIDEO (required)         → model: wan2.7-videoedit
      • Up to 4 optional reference IMAGE inputs
      • audio_setting: auto | origin

    Both output VIDEO — wire to Save Video node.
    Requires DASHSCOPE_API_KEY env var (or pass it via the api_key input).
    Supports Beijing and Singapore (workspace_id) regional endpoints.
  deps:    []
  version: "0.1.0"

wan_fal:
  description: |
    Wan 2.7 on fal.ai — three nodes over the fal queue REST API (raw HTTP, no extra deps).
    All share the fal_common client (nodes/fal_common/client.py: auth, submit/poll, media
    data-URIs, download) so future fal.ai models reuse the transport.

      WanFalImageToVideo      → fal-ai/wan/v2.7/image-to-video
        first frame + optional end frame + optional video-continuation (no audio)
      WanFalEditVideo         → fal-ai/wan/v2.7/edit-video
        instruction edit of a source VIDEO + optional reference IMAGE
      WanFalReferenceToVideo  → fal-ai/wan/v2.7/reference-to-video
        up to 4 reference images + up to 2 reference videos (multi-subject)

    Each outputs (VIDEO, seed, key_status) — wire VIDEO to the Save Video node.
    Category: Ranomany/fal.ai. Requires FAL_KEY env var (or pass it via the api_key input).
  deps:    []
  version: "0.1.0"

wan_fal_image:
  description: |
    Wan 2.6 image models on fal.ai — two nodes over the fal queue REST API (shares
    the fal_common client). Output a standard ComfyUI IMAGE batch.

      WanFalTextToImage  → wan/v2.6/text-to-image
        prompt (+ optional style reference image), up to 5 images
      WanFalImageToImage → wan/v2.6/image-to-image
        prompt + 1–3 reference images, up to 4 images

    Category: Ranomany/fal.ai. Requires FAL_KEY env var (or pass it via the api_key input).
  deps:    []
  version: "0.1.0"

camera_angle:
  description: |
    Ships Camera Angle (3D camera-angle control via a Vue + Three.js GUI) and
    Camera Angle (Load Image). Emits camera-direction text plus the composed image.
  deps:    []
  version: "0.1.0"

load_latest_output:
  description: |
    Load Image (Edit Mode) — a LoadImage-style picker that can auto-snap to the
    newest file in the output directory (via GET /ranomany/latest-output).
  deps:    []
  version: "0.1.0"

video_info:
  description: |
    Ships Load Video (Info) — plays a video and outputs fps / frame_count /
    duration / dimensions / filename / extension — Extract Video Frames
    (class_type RanomanyExtractVideoFrames): from-start / from-last / first-of-each-second /
    all-of-second / specific-frame extraction — Trim Video Frames
    (class_type RanomanyTrimVideoFrames): drop N frames from the start or end — and Convert
    Video FPS (class_type RanomanyConvertVideoFPS): retime / duplicate / blend /
    motion-interpolate / dedup-resample a clip to a target fps. Uses PyAV.
  deps:    [av>=11.0]
  version: "0.1.0"

cf_identity:
  description: |
    Cloudflare Access Identity — surfaces the authenticated user's Cf-Access-* identity
    (email / claims / headers) into the workflow via GET /ranomany/cf-identity, for
    attribution/metadata (not authorization).
  deps:    []
  version: "0.1.0"

metadata_builder:
  description: |
    Build Metadata (Text) — compiles arbitrary key/value pairs plus the Cloudflare
    identity into a JSON string for the Save Image / Save Video `extra_metadata` input.
  deps:    []
  version: "0.1.0"

multi_concat:
  description: |
    Multi Concat (class_type RanomanyMultiConcat) — concatenates up to 10 values
    (number or string) into a single STRING. First two inputs required, 3-10 optional;
    each can be typed in the GUI or wired in. Optional separator; empty inputs skipped.
  deps:    []
  version: "0.1.0"

# Server-only (no graph node): usage tracking, "last seen" presence, and the weekly
# email digest (Ranomany Ops sidebar). Routes under /ranomany/usage* and /ranomany/quota-report.
quota:
  description: |
    Tracks per-user, per-month generation counts (image/video/utils, via a data-driven
    ranomany_usage_categories.json mapping) and last-seen presence behind Cloudflare Access;
    emails a weekly digest via SMTP. No graph node — aiohttp middleware + routes only.
  deps:    []
  version: "0.1.0"
