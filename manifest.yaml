# Index of nodes shipped by this repo. Informational — installation still
# selects subdirs by name in the consuming Dockerfile.

save_image_no_meta:
  description: |
    Save images as PNG without ComfyUI's default workflow-JSON metadata.
    Embeds only the keys explicitly provided via `extra_metadata` (JSON dict).
  deps:    []
  version: "0.1.0"

api_key:
  description: |
    Generic API key resolver node. Set key_name to any environment variable
    (e.g. GEMINI_API_KEY, OPENAI_API_KEY) and wire the STRING output to any
    node that needs it. Shows a status badge indicating where the key was found:
    node input, environment variable, or .env file. Works for any provider.
    Resolution order: node input → env var → .env file (node dir / custom_nodes / ComfyUI root).
  deps:    []
  version: "0.1.0"

gemini_image:
  description: |
    Generate or edit images via the Gemini API (gemini-3.1-flash-image-preview or
    gemini-3-pro-image-preview). Accepts an optional input IMAGE for img2img editing.
    Outputs a standard ComfyUI IMAGE batch tensor.
    Requires GEMINI_API_KEY env var (or pass it via the api_key input).
  deps:    [google-genai>=1.0.0]
  version: "0.1.0"

openai_image:
  description: |
    Generate or edit images via the OpenAI Images API (gpt-image-2 / ChatGPT Images 2.0).
    Accepts an optional input IMAGE for editing and an optional MASK for inpainting.
    Outputs a standard ComfyUI IMAGE batch tensor.
    Requires OPENAI_API_KEY env var (or pass it via the api_key input).
  deps:    [openai>=1.0.0]
  version: "0.1.0"

gemini_veo:
  description: |
    Generate videos via the Veo API (veo-3.1-generate-preview and variants).
    Accepts optional first-frame and last-frame IMAGE anchors.
    Outputs a VIDEO value — wire to the bundled Save Video node to write the MP4 to disk.
    Also ships the Save Video node (Category: Ranomany) in the same file.
    Requires GEMINI_API_KEY env var (or pass it via the api_key input).
    Generation takes 1–3 minutes; the node blocks until complete.
  deps:    [google-genai>=1.0.0]
  version: "0.2.0"

wan_image:
  description: |
    Generate or edit images via Alibaba Cloud Wan 2.7 (wan2.7-image-pro, wan2.7-image).
    Supports text-to-image, image editing (prompt + input IMAGE), and image set generation.
    Outputs a standard ComfyUI IMAGE batch tensor.
    No extra dependencies — uses Python stdlib HTTP only.
    Requires DASHSCOPE_API_KEY env var (or pass it via the api_key input).
    Supports both Beijing and Singapore (workspace_id) regional endpoints.
  deps:    []
  version: "0.1.0"

wan_video:
  description: |
    Ships two nodes using Alibaba Cloud Wan 2.7 video models (raw HTTP, no extra deps):

    WanVideo — four modes from a single node:
      • Text-to-video (no image connected)       → model: wan2.7-t2v
      • Image-to-video (first_frame connected)   → model: wan2.7-i2v-2026-04-25
      • First+last frame / r2v                   → model: wan2.7-i2v-2026-04-25
      • Video continuation (first_clip connected) → model: wan2.7-i2v-2026-04-25

    WanVideoEdit — instruction-based video editing:
      • Prompt + source VIDEO (required)         → model: wan2.7-videoedit
      • Up to 4 optional reference IMAGE inputs
      • audio_setting: auto | origin

    Both output VIDEO — wire to Save Video node.
    Requires DASHSCOPE_API_KEY env var (or pass it via the api_key input).
    Supports Beijing and Singapore (workspace_id) regional endpoints.
  deps:    []
  version: "0.1.0"
