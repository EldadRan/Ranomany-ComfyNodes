# Build & publish the SeedVR2 RunPod worker image to GHCR.
# Only worker changes trigger it — node-side commits never rebuild the image.
name: seedvr2-runpod-worker

on:
  push:
    branches: [main]
    paths: ["workers/seedvr2_runpod/**", ".github/workflows/docker-publish.yml"]
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # No GHA cache: the ~17 GB weight layer exceeds GitHub's 10 GB/repo cache
      # budget, so exporting it just wastes minutes and gets evicted. Rebuilds are
      # infrequent (only on worker changes). If rebuild speed ever matters, switch
      # to registry cache (type=registry, stored in GHCR) rather than type=gha.
      - uses: docker/build-push-action@v6
        with:
          context: workers/seedvr2_runpod
          push: true
          tags: |
            ghcr.io/eldadran/seedvr2-runpod-worker:latest
            ghcr.io/eldadran/seedvr2-runpod-worker:${{ github.sha }}
