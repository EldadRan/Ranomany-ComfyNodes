# Build & publish the SeedVR2 RunPod worker image to GHCR.
# Only worker changes trigger it — node-side commits never rebuild the image.
name: seedvr2-runpod-worker

on:
  push:
    branches: [main]
    paths: ["workers/seedvr2_runpod/**", ".github/workflows/docker-publish.yml"]
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Registry cache in GHCR (not type=gha — the ~17 GB weight layer blows past
      # GitHub's 10 GB/repo Actions-cache budget). A handler-only change then reuses
      # the cached weight-bake layer instead of re-downloading 17 GB, so rebuilds
      # drop from ~40 min to a few minutes. The cache lives in a separate :buildcache
      # tag; the first run populates it.
      - uses: docker/build-push-action@v6
        with:
          context: workers/seedvr2_runpod
          push: true
          tags: |
            ghcr.io/eldadran/seedvr2-runpod-worker:latest
            ghcr.io/eldadran/seedvr2-runpod-worker:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/eldadran/seedvr2-runpod-worker:buildcache
          cache-to: type=registry,ref=ghcr.io/eldadran/seedvr2-runpod-worker:buildcache,mode=max
