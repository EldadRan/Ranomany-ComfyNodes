# Build & publish the SeedVR2 RunPod worker image to GHCR.
# Only worker changes trigger it — node-side commits never rebuild the image.
name: seedvr2-runpod-worker

on:
  push:
    branches: [main]
    paths: ["workers/seedvr2_runpod/**", ".github/workflows/docker-publish.yml"]
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set lowercase image name
          run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/seedvr2-runpod-worker" >> "$GITHUB_ENV"

      - uses: docker/build-push-action@v6
        with:
          context: workers/seedvr2_runpod
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/seedvr2-runpod-worker:latest
            ghcr.io/${{ github.repository_owner }}/seedvr2-runpod-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
